
        <!DOCTYPE html>
        <html>
        <head>
            <title>AI Generated Video</title>
            <style>
                body {
                    margin: 0;
                    padding: 20px;
                    background: #000;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    min-height: 100vh;
                    font-family: Arial, sans-serif;
                }
                .video-container {
                    max-width: 900px;
                    background: #111;
                    padding: 20px;
                    border-radius: 15px;
                    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
                }
                video {
                    width: 100%;
                    border-radius: 10px;
                    margin-bottom: 15px;
                }
                .controls {
                    text-align: center;
                    margin-top: 15px;
                }
                .btn {
                    background: #4CAF50;
                    color: white;
                    border: none;
                    padding: 10px 20px;
                    margin: 5px;
                    border-radius: 5px;
                    cursor: pointer;
                    font-size: 14px;
                }
                .info {
                    color: white;
                    text-align: center;
                    margin-bottom: 15px;
                }
            </style>
        </head>
        <body>
            <div class="video-container">
                <div class="info">
                    <h2>🎬 AI Generated Video</h2>
                    <p>Video + Audio Combined</p>
                </div>
                <video controls autoplay>
                    <source src="/static/videos/luma_video_1769495661.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <audio id="backgroundAudio" loop>
                    <source src="/static/audio/audio_1769495568.mp3" type="audio/mpeg">
                </audio>
                <div class="controls">
                    <button class="btn" onclick="playAudioWithVideo()">🎵 Play Audio</button>
                    <button class="btn" onclick="downloadVideo()">📥 Download Video</button>
                    <button class="btn" onclick="downloadAudio()">🎵 Download Audio</button>
                </div>
            </div>
            
            <script>
                const video = document.querySelector('video');
                const audio = document.getElementById('backgroundAudio');
                
                function playAudioWithVideo() {
                    audio.play();
                    video.play();
                }
                
                function downloadVideo() {
                    const link = document.createElement('a');
                    link.href = '/static/videos/luma_video_1769495661.mp4';
                    link.download = 'ai_video.mp4';
                    link.click();
                }
                
                function downloadAudio() {
                    const link = document.createElement('a');
                    link.href = '/static/audio/audio_1769495568.mp3';
                    link.download = 'ai_audio.mp3';
                    link.click();
                }
                
                // Auto-play video when page loads
                window.addEventListener('load', function() {
                    video.play();
                });
            </script>
        </body>
        </html>
